networks:
  auth_network:
    driver: bridge
  supabase_network:
    external: true  # This assumes the Supabase network already exists
                    # Comment this out if not using self-hosted Supabase

volumes:
  redis_data:
    driver: local
#  auth_service_prod_data:  # Uncomment if using the local database
