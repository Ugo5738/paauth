version: '3.8'

services:
  auth_service:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: auth-service:prod
    container_name: auth-service-prod
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - ROOT_PATH=/api/v1
      - LOGGING_LEVEL=INFO
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - auth_network
      - supabase_network  # For connecting to self-hosted Supabase

  # Redis for token revocation and rate limiting
  redis:
    image: redis:7-alpine
    container_name: auth_redis_prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - auth_network

# Commented out database service - when using self-hosted Supabase, you'll use its PostgreSQL database instead
